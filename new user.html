<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glamour Borrow - New User Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #F8EDE5;
            margin: 0;
            padding: 0;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #5F4634;
        }
        nav a {
            margin: 0 15px;
            color: #5F4634;
            text-decoration: none;
        }
        .search-cart {
            display: flex;
            align-items: center;
        }
        .search-cart button {
            background-color: #D1B19D;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            margin-left: 10px;
            cursor: pointer;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        .register-section {
            background-color: #F8EDE5;
            display: flex;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        .register-section img {
            max-width: 200px;
            margin-right: 20px;
            border-radius: 8px;
        }
        .register-form {
            display: flex;
            flex-direction: column;
            max-width: 300px;
        }
        .register-form h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .register-form input {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .register-form button {
            padding: 10px;
            background-color: #8B6B5D;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .login-link {
            margin-top: 10px;
            text-align: right;
        }
        .login-link a {
            text-decoration: none;
            color: #5F4634;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Glamour Borrow</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Collection</a>
        <a href="#">About us</a>
        <a href="#">Contact</a>
        <a href="#">Account</a>
    </nav>
    <div class="search-cart">
        <button>🔍</button>
        <button>🛒</button>
    </div>
</header>

<div class="container">
    <div class="register-section">
        <img src="C:\Users\parva\Downloads\register image.jpg" alt="Fashion Clothes">
        <form class="register-form" action="login.html" method="POST">
            <h2>New User Registration</h2>
            <label>Full Name</label>
            <input type="text" name="fullname" placeholder="Enter Full Name" required>
            <label>Mobile Number</label>
            <input type="text" name="mobile" placeholder="Enter Mobile Number" required>
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter Email" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter Password" required>
            <button type="submit">Register</button>
            <div class="login-link">
                <span>Already have an account? <a href="login.html">Login</a></span>
            </div>
        </form>
    </div>
</div>

</body>
</html>
