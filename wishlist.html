<html>
 <head>
  <title>
   Glamour Borrow Wishlist
  </title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet"/>
  <style>
   body {
            font-family: 'Roboto', sans-serif;
            background-color: #fcefe3;
            margin: 0;
            padding: 0;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: #fcefe3;
        }
        .logo {
            display: flex;
            align-items: center;
        }
        .logo img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #333;
        }
        .nav {
            display: flex;
            gap: 20px;
        }
        .nav a {
            text-decoration: none;
            color: #333;
            font-size: 18px;
        }
        .search-cart {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-cart input {
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 20px;
        }
        .search-cart i {
            font-size: 20px;
            color: #333;
        }
        .wishlist {
            padding: 20px;
        }
        .wishlist h2 {
            font-size: 32px;
            color: #333;
        }
        .items {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .item {
            text-align: center;
            background-color: #fff;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .item img {
            width: 200px;
            height: 300px;
            border-radius: 10px;
        }
        .item p {
            font-size: 18px;
            color: #333;
            margin: 10px 0;
        }
        .item button {
            background-color: #a0522d;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px 0;
        }
        .item button:hover {
            background-color: #8b4513;
        }
  </style>
 </head>
 <body>
  <div class="header">
