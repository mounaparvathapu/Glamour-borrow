<html>
<head>
    <title>Glamour Borrow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Nunito', sans-serif;
            background-color: #f8e8dc;
            color: #333;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            border-bottom: 1px solid #ccc;
        }
        .logo {
            display: flex;
            align-items: center;
        }
        .logo span {
            font-size: 24px;
            font-weight: 700;
            margin-left: 10px;
        }
        .logo span:first-child {
            color: #333;
        }
        .logo span:last-child {
            color: #333;
        }
        .nav {
            display: flex;
            align-items: center;
        }
        .nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #333;
            font-weight: 400;
        }
        .nav a:hover {
            text-decoration: underline;
        }
        .search-cart {
            display: flex;
            align-items: center;
        }
        .search-cart .search {
            background-color: #d3b8a3;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            margin-right: 10px;
            display: flex;
            align-items: center;
        }
        .search-cart .search input {
            border: none;
            background: none;
            outline: none;
            padding-left: 5px;
        }
        .search-cart .cart {
            font-size: 20px;
            color: #333;
        }
        .content {
            padding: 50px 20px;
            text-align: center;
        }
        .content h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .content p {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 40px;
        }
        .content a {
            font-size: 18px;
            color: #333;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <span>Glamour</span>
            <span>Borrow</span>
        </div>
        <div class="nav">
            <a href="#">Home</a>
            <a href="#">login</a>
            <a href="#">Collection</a>
            <a href="#">About Us</a>
            <a href="#">Contact us</a>
            <a href="account.html">Account</a>
        </div>
        <div class="search-cart">
            <div class="search">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search">
            </div>
            <div class="cart">
                <i class="fas fa-shopping-cart"></i>
            </div>
        </div>
    </div>
    <div class="content">
        <h1>Rentals :</h1>
        <p>You have not rented anything till now.</p>
        <a href="products.html">Continue Shopping</a>
    </div>
</body>
</html>
