<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glamour Borrow Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #F8EDE5;
            margin: 0;
            padding: 0;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #5F4634;
        }
        nav a {
            margin: 0 15px;
            color: #5F4634;
            text-decoration: none;
        }
        .search-cart {
            display: flex;
            align-items: center;
        }
        .search-cart button {
            background-color: #D1B19D;
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            margin-left: 10px;
            cursor: pointer;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        .login-section {
            background-color: #F8EDE5;
            display: flex;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        .login-section img {
            max-width: 2000px;
            margin-right: 20px;
            border-radius: 8px;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            max-width: 3000px;
        }
        .login-form h2 {
            font-size: 24px;
            margin-bottom: 80px;
        }
        .login-form input {
            padding: 20px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .login-form button {
            padding: 10px;
            background-color: #8B6B5D;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .shop-now {
            margin-top: 20px;
            padding: 10px;
            background-color: #8B6B5D;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            text-align: center;
            text-decoration: none;
        }
        .new-user {
            margin-top: 10px;
            text-align: right;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Glamour Borrow</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">Collection</a>
        <a href="#">About us</a>
        <a href="#">Contact</a>
        <a href="#">Account</a>
    </nav>
    <div class="search-cart">
        <button>🔍</button>
        <button>🛒</button>
    </div>
</header>

<div class="container">
    <div class="login-section">
        <img src="C:\Users\parva\Downloads\login image.jpg" alt="Fashion Clothes">
        <div class="login-form">
            <h2>LOGIN</h2>
            <label>Enter Mobile Number or Email</label>
            <input type="text" placeholder="Mobile Number or Email">
            <label>Password</label>
            <input type="password" placeholder="Password">
            <button>Login</button>
            <a href="products.html">Login</a>
            <div class="new-user">
                <a href="new user.html">New User?</a>
            </div>
            <a href="#" class="shop-now">SHOP NOW</a>
        </div>
    </div>
</div>

</body>
</html>
