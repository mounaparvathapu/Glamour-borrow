<html>
 <head>
  <title>
   Glamour Borrow
  </title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <style>
   body {
            font-family: Arial, sans-serif;
            background-color: #fdf1e4;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        .header .logo {
            display: flex;
            align-items: center;
        }
        .header .logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 10px;
        }
        .header .nav {
            display: flex;
            gap: 20px;
        }
        .header .nav a {
            text-decoration: none;
            color: #000;
            font-weight: bold;
        }
        .header .search-cart {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .search-cart input {
            padding: 5px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
        }
        .header .search-cart .fa-shopping-cart {
            font-size: 20px;
        }
        .account-section {
            margin: 50px 0;
        }
        .account-section h1 {
            font-size: 24px;
            color: #000;
        }
        .account-section h2 {
            font-size: 20px;
            color: #000;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            justify-content: center;
            margin: 50px 500px;
        }
        .buttons a {
            background-color: #b08d6f;
            color: #000;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .shop-now {
            display: inline-block;
            padding: 8px 15px;
            background-color: #b08d6f;
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
        }
  </style>
 </head>
 <body>
  <div class="header">
   <div class="logo">
    <img alt="Glamour Borrow Logo" height="40" src="https://storage.googleapis.com/a1aa/image/pMNLZega4rzDB6cPJQEcjBcXmxhWUR6dFyelGYxzZMTmOJyTA.jpg" width="40"/>
    <span>
     Glamour Borrow
    </span>
   </div>
   <div class="nav">
    <a href="#">
     Home
    </a>
    <a href="#">

    </a>
    <a href="#">
     About Us
    </a>
    <a href="#">
     Contact
    </a>
    <a href="#">
     Account
    </a>
   </div>
   <div class="search-cart">
    <input placeholder="Search" type="text"/>
    <i class="fas fa-shopping-cart">
    </i>
   </div>
  </div>
  <div class="account-section">
   <h1>
    ACCOUNT:
   </h1>
   <h2>
    Hey "customer name":
   </h2>
   <div class="buttons">
    <a href="rentals.html">

    </a>

    </a>

    SHOP NOW
