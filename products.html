<html></html>
 <head>
  <title>
   Glamour Borrow
  </title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet"/>
  <style>
   body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8e8df;
            margin: 0;
            padding: 0;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: #f8e8df;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .logo span {
            color: #a67c52;
        }
        .nav {
            display: flex;
            gap: 20px;
        }
        .nav a {
            text-decoration: none;
            color: #333;
            font-weight: 400;
        }
        .nav a:hover {
            font-weight: 700;
        }
        .search-cart {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .search-box {
            display: flex;
            align-items: center;
            background-color: #d3b8a1;
            padding: 5px 10px;
            border-radius: 20px;
        }
        .search-box input {
            border: none;
            background: none;
            outline: none;
            padding: 5px;
        }
        .search-box i {
            color: #fff;
        }
        .cart i {
            font-size: 20px;
            color: #333;
        }
        .products {
            text-align: center;
            padding: 50px 0;
        }
        .products h2 {
            font-size: 24px;
            color: #333;
        }
        .product-list {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 30px;
        }
        .product-item {
            text-align: center;
        }
        .product-item img {
            width: 300px;
            height: 300px;
            object-fit: cover;
        }
        .product-item p {
            font-size: 18px;
            color: #333;
            margin-top: 10px;
        }
        .shop-now {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #a67c52;
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
        }
        .product-button {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #a67c52;
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
        }
  </style>
 </head>
 <body>
  <header class="header">
   <div class="logo">
    Glamour
    <span>
     Borrow
    </span>
   </div>
   <nav class="nav">
    <a href="#">
     Home
    </a>
    <a href="#">
     Collection
    </a>
    <a href="about us.html">
     About us
    </a>
    <a href="contact us.html">
     Contact
    </a>
    <a href="account.html">
     Account
    </a>
   </nav>
   <div class="search-cart">
    <div class="search-box">
     <input placeholder="Search" type="text"/>
     <i class="fas fa-search">
     </i>
    </div>
    <div class="cart">
     <i class="fas fa-shopping-cart">
     </i>
    </div>
   </div>
  </header>
  <section class="products">
   <h2>
    PRODUCTS :
   </h2>
   <div class="product-list">
    <div class="product-item">
     <img alt="A woman in a brown dress standing in a vintage room" height="300" src="https://storage.googleapis.com/a1aa/image/0h7BUhQeBfuBqUf1vAYgf358tCe5Op3kUu0SdwxNiZkizSvdC.jpg" width="300"/>
     <p>
      Dresses
     </p>
     <a class="product-button" href="dresses.html">
      View Dresses
     </a>
    </div>
    <div class="product-item">
     <img alt="A pair of brown high-heeled sandals" height="300" src="https://storage.googleapis.com/a1aa/image/Y9HDTlpYAypsItGei4Wmg1WdG5SIo9W1u4U30ROvpedZW6tTA.jpg" width="300"/>
     <p>
      Footwear
     </p>
     <a class="product-button" href="footwear.html">
      View Footwear
     </a>
    </div>
    <div class="product-item">
     <img alt="Various accessories including sunglasses, makeup, and a black purse" height="300" src="https://storage.googleapis.com/a1aa/image/KsHseQEYdOWqLSAl4m4gUe2QxpQBtTGS9RqY0zqhhXcbW6tTA.jpg" width="300"/>
     <p>
      Accessories
     </p>
     <a class="product-button" href="accessories.html">
      View Accessories
     </a>
    </div>
   </div>
   <a class="shop-now" href="#">
    SHOP NOW
   </a>
  </section>
 </body>
</html>
