<!DOCTYPE html>
<html>
<head>
    <title>Account Details - Glamour Borrow</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fdf1e4;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .container {
            margin: 50px auto;
            padding: 20px;
            max-width: 600px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
        }
        .container h1 {
            color: #000;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .form-group {
            margin: 15px 0;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 16px;
            color: #000;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
        }
        .form-group button {
            background-color: #b08d6f;
            color: #fff;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .form-group button:hover {
            background-color: #a07b5f;
        }
        .continue-shopping {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            background-color: #b08d6f;
            color: #fff;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 15px;
        }
        .continue-shopping:hover {
            background-color: #a07b5f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Account Details</h1>
        <form id="accountForm">
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" value="Customer Name" />
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" value="customer@example.com" />
            </div>
            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" value="123-456-7890" />
            </div>
            <div class="form-group">
                <label for="address">Address:</label>
                <input type="text" id="address" name="address" placeholder="Enter your address" value="123 Fashion Street, City" />
            </div>
            <div class="form-group">
                <button type="submit">Update Details</button>
            </div>
        </form>
        <a href="products.html" class="continue-shopping">Continue Shopping</a>
    </div>

    <script>
        document.getElementById('accountForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent actual form submission
            alert("Your details are updated");
        });
    </script>
</body>
</html>
